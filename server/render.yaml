services:
  - type: web
    name: ticketx-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node dist/src/main
    envVars:
      - key: NODE_VERSION
        value: 18.0.0
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PAYSTACK_SECRET_KEY
        sync: false
